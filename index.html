<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Master - Recipe Finder</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="nav-bar">
        <div style="display: flex; gap: 16px; align-items: center;">
            <a href="login.html" class="login-btn">
                <i class="fas fa-user"></i> Login / Signup
            </a>
            <button class="theme-toggle" title="Toggle Theme">
                🌙
            </button>
        </div>
        <span id="user-status" class="user-info"></span>
    </nav>
    
    <header>
        
        <h1>🍽️ Meal Master</h1>
        <p>Discover delicious recipes with ingredients you have!</p>
    </header>
    
    <div class="search-area">
        <div class="search-wrap">
            <div class="search-box">
                <input type="text" id="input" placeholder="Enter ingredient (e.g., chicken, rice)...">
                <select id="dietFilter">
                    <option value="both">Both Veg & Non-Veg</option>
                    <option value="veg">Vegetarian Only</option>
                    <option value="nonveg">Non-Veg Only</option>
                </select>
                <button id="searchButton">🔍 Search</button>
            </div>
        </div>
    </div>
    
    <div id="meals"></div>
    
    <script src="script.js"></script>
    <script>

        const user = localStorage.getItem('user');
        const status = document.getElementById('user-status');
        if (user && user !== 'guest') {
            status.textContent = `Welcome, ${user}! `;
            status.className = 'user-status logged-in';
        }
    </script>
</body>
</html>
